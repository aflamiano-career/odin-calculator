<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="wclassth=device-wclassth, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="calculator-outline">
            <div class="display">
                <div class="js-display-memory">Memory</div>
                <div class="js-display-total">Total</div>
                <div class="js-display-input">Input</div>
            </div>
            <div class="function-keys">
                <button class="btn-clear">Clear</button>
                <button class="btn-delete">Delete</button>
            </div>
            <div class="main-keypad js-main-keypad">
                <button class="btn-7" value="7">7</button>
                <button class="btn-8" value="8">8</button>
                <button class="btn-9" value="9">9</button>
                <button class="btn-divide" value="/">/</button>

                <button class="btn-4" value="4">4</button>
                <button class="btn-5" value="5">5</button>
                <button class="btn-6" value="6">6</button>
                <button class="btn-multiply" value="*">*</button>
                
                <button class="btn-1" value="1">1</button>
                <button class="btn-2" value="2">2</button>
                <button class="btn-3" value="3">3</button>
                <button class="btn-subtract" value="-">-</button>
                
                <button class="btn-dot" value=".">.</button>
                <button class="btn-0" value="0">0</button>
                <button class="btn-equals" value="=">=</button>
                <button class="btn-add" value="+">+</button>
            </div>
        </div>
    </div>
</body>
</html>
